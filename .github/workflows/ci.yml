name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -v ./...

  cross-build:
    name: Build ${{ matrix.goos }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        arch: [x86, x64, arm64]
        include:
          - arch: x86
            goarch: "386"
          - arch: x64
            goarch: amd64
          - arch: arm64
            goarch: arm64
        exclude:
          # 32-bit macOS is not supported by Go.
          - goos: darwin
            arch: x86
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          out="dist/nds-gba-border-go_${GOOS}_${{ matrix.arch }}${ext}"
          go build -trimpath -ldflags="-s -w" -o "$out" .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nds-gba-border-go_${{ matrix.goos }}_${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: cross-build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
